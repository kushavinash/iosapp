name: Build iOS
on:
  push:
    branches: [ main ]

# Force the runner to use Node 24 for all JavaScript actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest 
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4 # Check for v5 if released by now

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Explicitly use Node 24 for your Angular build

      - name: Install Dependencies
        run: npm install

      - name: Build Angular Project
        run: npm run build -- --configuration=production

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build Xcode Project
        run: |
          cd ios/App
          xcodebuild -scheme App -allowProvisioningUpdates
