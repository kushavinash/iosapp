name: Build iOS
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # Use macos-14 or 15 specifically for better stability in 2026
    runs-on: macos-14 
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6

      # 1. Ensure we are using a stable Xcode version
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Angular Project
        run: npm run build -- --configuration=production

      - name: Capacitor Sync
        run: npx cap sync ios

      # 2. Fix for CocoaPods permissions and installation
      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      # 3. Build using 'xcodebuild' with destination mapping
      # This is the most reliable way to build for simulator in CI
      - name: Build Xcode Project
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -derivedDataPath build
          
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ios-simulator-app
          # Path updated to match the derivedDataPath structure
          path: build/Build/Products/Debug-iphonesimulator/*.app
          retention-days: 5
