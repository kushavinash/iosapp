name: Build iOS
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14 
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Dependencies
        # Using --force to bypass peer dependency conflicts common in Angular
        run: npm install --force 

      - name: Build Angular Project
        run: npm run build -- --configuration=production

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod repo update
          pod install

      - name: Build Xcode Project
        # We add 'OTHER_CODE_SIGNING_FLAGS="--keychain test"' to force skip signing
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ENTITLEMENTS="" \
            BITCODE_GENERATION_MODE=bitcode

      - name: Upload Build Artifact
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: ios-simulator-app
          path: build/Build/Products/Debug-iphonesimulator/*.app
