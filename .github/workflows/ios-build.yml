name: Build iOS
on:
  push:
    branches: [ main ]

env:
  # This tells the runner to use the new engine immediately
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: macos-latest 
    steps:
      - name: Checkout Source
        # v6 is the standard as of early 2026 for Node 24 support
        uses: actions/checkout@v6 

      - name: Setup Node.js
        # v6 of setup-node removes the Node 20 legacy baggage
        uses: actions/setup-node@v6 
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Build Angular Project
        run: npm run build -- --configuration=production

      - name: Capacitor Sync
        run: npx cap sync ios
