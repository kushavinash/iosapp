name: Build iOS
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --force

      - name: Build Angular Project
        # We add 'ls' to debug the folder structure if it fails
        run: |
          npm run build -- --configuration=production
          ls -R dist/

      - name: Capacitor Sync
        run: |
          npx cap sync ios
          npx cap copy ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build Xcode Project
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build \
            | xcbeautify || xcodebuild -workspace ios/App/App.xcworkspace -scheme App -configuration Debug -destination 'generic/platform=iOS Simulator' -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Upload Build Artifact
        if: always() # Upload logs even if it fails
        uses: actions/upload-artifact@v6
        with:
          name: ios-build-output
          path: build/Build/Products/Debug-iphonesimulator/
